name: Lighthouse Audit - CaseCore
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Uppdaterad till v4

      - name: Audit CaseCore Live URL
        uses: treosh/lighthouse-config-action@v12 # Uppdaterad till v12
        with:
          urls: 'https://www.casecore.se'
          uploadArtifacts: true
          temporaryPublicStorage: true
