name: Lighthouse Audit - CaseCore
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit CaseCore Live URL
        uses: treosh/lighthouse-config-action@v12
        with:
          # Vi lägger till en explicit konfiguration här
          urls: 'https://www.casecore.se'
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
